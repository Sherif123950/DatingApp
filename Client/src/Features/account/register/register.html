<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
    <div class="card-title justify-center text-3xl text-primary">Sign up</div>
    <div class="card-body w-full">
        <form #registerForm="ngForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
            <input [(ngModel)]="creds.email" class="mt-2 input w-full" placeholder="Email" name="email" type="email"/>
            <input [(ngModel)]="creds.displayName" class="mt-2 input w-full" placeholder="Display Name" name="displayName" type="text"/>
            <input [(ngModel)]="creds.password" class="mt-2 input w-full" placeholder="Password" name="password" type="password" />
            
            <div class="flex items-center justify-end gap-3">
                <button (click)="cancel()" type="button" class="btn">Cancel</button>
                <button
                    class="btn btn-primary" type="submit">Next
                </button>
            </div>
        </form>
